services:
  postgres:
    image: postgres:16
    container_name: malinowa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: malinowa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - malinowa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d malinowa"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  malinowa_postgres_data: