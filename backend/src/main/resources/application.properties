spring.application.name=MaliNOWA
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${MALINOWA_DB_URL:jdbc:postgresql://localhost:5432/malinowa}
spring.datasource.username=${MALINOWA_DB_USERNAME:postgres}
spring.datasource.password=${MALINOWA_DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.frontend-url=${MALINOWA_FRONTEND_URL:http://localhost:3000}
